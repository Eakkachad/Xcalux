<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hokusai brush demo</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; align-items: center; }
    h1 { margin: 0; font-size: 1.25rem; display: flex; align-items: center; gap: 0.6rem; }
    h1 a { font-size: 0.85rem; font-weight: normal; opacity: 0.7; text-decoration: none; }
    h1 a:hover { opacity: 1; }
    canvas { border: 1px solid #aaa; touch-action: none; background: white; cursor: crosshair; }
    .controls { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    label { display: flex; gap: 0.35rem; align-items: center; font-size: 0.85rem; }
    input[type="color"] { width: 2.2rem; height: 1.8rem; border: 0; padding: 0; background: transparent; cursor: pointer; }
    button { padding: 0.4rem 0.8rem; cursor: pointer; }
    select { padding: 0.3rem; }
    #status { font-size: 0.8rem; opacity: 0.7; }
  </style>
</head>
<body>
  <h1>
    Hokusai brush demo
    <a href="https://github.com/reearth/hokusai" target="_blank" rel="noopener">→ GitHub</a>
  </h1>
  <div class="controls">
    <label>Brush
      <select id="brush"></select>
    </label>
    <label>Colour
      <input type="color" id="color" value="#202020" />
    </label>
    <label>Size (Δlog₂)
      <input type="range" id="size" min="-2" max="2" step="0.1" value="0" />
    </label>
    <button id="clear">Clear</button>
  </div>
  <canvas id="canvas" width="720" height="480"></canvas>
  <div id="status">loading…</div>

  <script type="module">
    import init, { HokusaiBrush, HokusaiCanvas } from "./pkg/hokusai_wasm.js";

    // The fixtures live alongside the example brushes in this repo. The demo
    // expects them to be copied (or symlinked) next to this index.html under
    // ./brushes/, so a static server can serve them without path tricks.
    const BRUSHES = [
      ["charcoal",   "brushes/charcoal.myb"],
      ["calligraphy","brushes/calligraphy.myb"],
      ["brush",      "brushes/brush.myb"],
      ["marker fat", "brushes/marker_fat.myb"],
    ];

    const status = document.getElementById("status");
    const canvasEl = document.getElementById("canvas");
    const ctx = canvasEl.getContext("2d");
    const brushSel = document.getElementById("brush");
    const colorInput = document.getElementById("color");
    const sizeInput = document.getElementById("size");
    const clearBtn = document.getElementById("clear");

    for (const [name] of BRUSHES) {
      const opt = document.createElement("option");
      opt.textContent = name;
      brushSel.append(opt);
    }

    await init();
    status.textContent = "ready — click and drag";

    const canvas = new HokusaiCanvas(canvasEl.width, canvasEl.height);
    let brush = null;

    let brushDesignedRadiusLog = 1.0;

    async function loadBrush(index) {
      const [, path] = BRUSHES[index];
      const json = await fetch(path).then(r => r.text());
      brush = new HokusaiBrush(json);
      // Remember the brush's designed size so the slider can offset from it
      // — overriding to a fixed log₂ throws off settings (anti_aliasing,
      // dab spacing) that were authored for the natural radius.
      brushDesignedRadiusLog = brush.radiusLog();
      applyColour();
      applySize();
    }

    function applyColour() {
      if (!brush) return;
      const hex = colorInput.value;
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      const [h, s, v] = rgbToHsv(r, g, b);
      brush.setColorHsv(h, s, v);
    }

    function applySize() {
      if (!brush) return;
      brush.setRadiusLog(brushDesignedRadiusLog + parseFloat(sizeInput.value));
    }

    brushSel.addEventListener("change", () => loadBrush(brushSel.selectedIndex));
    colorInput.addEventListener("input", applyColour);
    sizeInput.addEventListener("input", applySize);
    clearBtn.addEventListener("click", () => {
      canvas.clear();
      flush();
    });

    let drawing = false;
    let lastT = 0;
    canvasEl.addEventListener("pointerdown", e => {
      drawing = true;
      lastT = e.timeStamp || performance.now();
      canvas.resetStroke();
      sendOne(e, e);
      flush();
      canvasEl.setPointerCapture(e.pointerId);
    });
    canvasEl.addEventListener("pointermove", e => {
      if (!drawing) return;
      // Modern browsers buffer multiple sub-events between pointermove
      // dispatches; replay them all so fast strokes don't get aliased
      // into a few sparse events.
      const subs = e.getCoalescedEvents ? e.getCoalescedEvents() : [];
      if (subs.length > 0) {
        for (const sub of subs) sendOne(sub, e);
      } else {
        sendOne(e, e);
      }
      flush();
    });
    canvasEl.addEventListener("pointerup", e => {
      drawing = false;
      // Paint the trailing pixels that slow_tracking lag would otherwise
      // leave unrendered.
      canvas.finishStroke(brush);
      flush();
      canvasEl.releasePointerCapture(e.pointerId);
    });

    function sendOne(ev, original) {
      const rect = canvasEl.getBoundingClientRect();
      const x = (ev.clientX - rect.left) * (canvasEl.width  / rect.width);
      const y = (ev.clientY - rect.top)  * (canvasEl.height / rect.height);
      // Pen → use real pressure. Mouse / touch with no pressure sensor →
      // treat each event as a full press so the brush actually shows up.
      const isPen = (original.pointerType || ev.pointerType) === "pen";
      const p = isPen ? (ev.pressure > 0 ? ev.pressure : 1.0) : 1.0;
      // PointerEvent.tiltX/Y are in degrees [-90, 90]; libmypaint expects
      // a unit-vector-style [-1, 1]. Use sin(tilt°) so a horizontal pen
      // (90°) maps to magnitude 1.
      const xtilt = Math.sin((ev.tiltX || 0) * Math.PI / 180);
      const ytilt = Math.sin((ev.tiltY || 0) * Math.PI / 180);
      const now = ev.timeStamp || performance.now();
      const dt = Math.max(0.001, (now - lastT) / 1000);
      lastT = now;
      canvas.strokeTo(brush, x, y, p, xtilt, ytilt, dt);
    }

    function flush() {
      const px = canvas.pixels();
      const img = new ImageData(new Uint8ClampedArray(px.buffer), canvas.width, canvas.height);
      ctx.putImageData(img, 0, 0);
    }

    function rgbToHsv(r, g, b) {
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const d = max - min;
      const v = max;
      const s = max === 0 ? 0 : d / max;
      let h = 0;
      if (d > 0) {
        if (max === r)      h = ((g - b) / d) % 6;
        else if (max === g) h = (b - r) / d + 2;
        else                h = (r - g) / d + 4;
        h /= 6;
        if (h < 0) h += 1;
      }
      return [h, s, v];
    }

    await loadBrush(0);
    flush();
  </script>
</body>
</html>
