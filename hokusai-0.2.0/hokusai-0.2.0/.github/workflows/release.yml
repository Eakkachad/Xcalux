name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

# Tighten the default token: trusted publishing uses the OIDC route, so
# the workflow doesn't need anything beyond `id-token: write` for that,
# plus `contents: write` to create the GitHub Release.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # `crates-io` is a deployment environment configured on the repo with
    # required reviewers, so cargo publish only runs after a maintainer
    # signs off on the tag. Set this up in
    # Settings → Environments → New environment → "crates-io" → enable
    # "Required reviewers".
    environment:
      name: crates-io
      url: https://crates.io/crates/hokusai
    permissions:
      contents: write   # softprops/action-gh-release needs to create the release
      id-token: write   # rust-lang/crates-io-auth-action exchanges this OIDC token
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Verify workspace
        run: cargo build --workspace --all-features

      # Trusted publishing: exchange the workflow's OIDC token for a
      # short-lived crates.io token. Requires the repo+workflow to be
      # registered as a Trusted Publisher on each crate at
      # https://crates.io/crates/<name>/owners (already configured).
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      # Publish each crate in dependency-topological order. Re-running the
      # release for a tag (e.g. after a partial failure) is idempotent: any
      # crate whose `<name>@<version>` is already on crates.io is skipped
      # with a notice, so the workflow only attempts the *missing* crates.
      # `cargo publish --workspace` would fail hard on the first already-
      # uploaded crate, which is why we drive the loop manually.
      - name: Publish workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set +e
          for crate in hokusai-core hokusai-brush hokusai-tile-mem hokusai-tiny-skia hokusai-wasm hokusai; do
            echo "::group::cargo publish -p $crate"
            output=$(cargo publish -p "$crate" 2>&1)
            status=$?
            echo "$output"
            echo "::endgroup::"
            if [ "$status" -ne 0 ]; then
              if echo "$output" | grep -qE "already (uploaded|exists)"; then
                echo "::notice::$crate already published, skipping"
              else
                echo "::error::$crate publish failed"
                exit "$status"
              fi
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
