name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: pages

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: latest

      - name: Build wasm bundle
        run: |
          wasm-pack build crates/hokusai-wasm \
            --target web \
            --release \
            --out-dir demo/pkg

      - name: Stage brush fixtures
        run: |
          mkdir -p crates/hokusai-wasm/demo/brushes
          cp hokusai/examples/fixtures/*.myb crates/hokusai-wasm/demo/brushes/

      - name: Disable Jekyll
        run: touch crates/hokusai-wasm/demo/.nojekyll

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: crates/hokusai-wasm/demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
