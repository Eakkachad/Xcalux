[package]
name = "sai_painting_app"
version = "0.1.0"
edition = "2021"
authors = ["Eakkachat Sathaphol"]

[dependencies]
# GUI Framework
egui = "0.27"
eframe = { version = "0.27", features = ["wgpu"] } # Forces eframe onto the wgpu backend

# Graphics & Core Engine
wgpu = "0.19" # Core low-level hardware abstraction layer
hokusai = { path = "hokusai-0.2.0/hokusai-0.2.0/hokusai", features = ["tile-mem", "myb-json"] } # Pure Rust brush engine with libmypaint compatibility

# Input Handling
octotablet = "0.1.0" # Native stylus and pressure API integration for Windows

# High-Performance Utilities
ahash = "0.8" # Ultra-fast non-cryptographic hashing for O(1) tile lookup coordinates
bytemuck = { version = "1.14", features = ["derive"] } # Zero-copy serialization for sending pixel arrays to the GPU
log = "0.4"
env_logger = "0.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
flate2 = "1.0"
png = "0.17"

# Aggressive Release Profiling for Maximum Hardware Throughput
[profile.release]
opt-level = 3       # Enable maximum optimizations
lto = true          # Enable Link-Time Optimization across all dependency crates
codegen-units = 1   # Reduce parallel code generation units to maximize optimization localizations
panic = "abort"     # Strip stack unwinding overhead to minimize memory and binary footprint
